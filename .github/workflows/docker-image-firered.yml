name: Build and Push FireRed-OCR to Docker Hub

on:
  # Permet le déclenchement manuel depuis l'onglet "Actions"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Build and push 
      - name: Build and Push FireRed-OCR
        uses: docker/build-push-action@v5
        with:
          context: ./docker_scripts/finetune_firered_ocr
          push: true
          tags: remidesbois/firered-auto-pipeline:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
